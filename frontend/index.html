<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent AI Skeleton</title>
  <style>
    :root { --bg: #0f1115; --panel: #181b21; --accent: #4c8bf5; --text: #e7e9ee; --muted: #8a90a0; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); }
    .wrap { max-width: 760px; margin: 0 auto; padding: 24px 16px; height: 100vh; display: flex; flex-direction: column; }
    h1 { font-size: 18px; margin: 0 0 4px; }
    .sub { color: var(--muted); font-size: 13px; margin-bottom: 16px; }
    #log { flex: 1; overflow-y: auto; background: var(--panel); border-radius: 12px; padding: 16px; }
    .msg { margin-bottom: 12px; line-height: 1.5; white-space: pre-wrap; }
    .msg .role { font-size: 12px; color: var(--muted); margin-bottom: 2px; }
    .msg.user .role { color: var(--accent); }
    form { display: flex; gap: 8px; margin-top: 12px; }
    input { flex: 1; padding: 12px; border-radius: 10px; border: 1px solid #2a2e38; background: #0c0e12; color: var(--text); font-size: 14px; }
    button { padding: 12px 18px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 14px; cursor: pointer; }
    button:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Agent AI Skeleton</h1>
    <div class="sub">LangGraph + FastAPI 에이전트 골격 데모 — /api/v1/chat</div>
    <div id="log"></div>
    <form id="form">
      <input id="input" type="text" placeholder="메시지를 입력하세요…" autocomplete="off" />
      <button id="send" type="submit">전송</button>
    </form>
  </div>

  <script>
    const log = document.getElementById("log");
    const form = document.getElementById("form");
    const input = document.getElementById("input");
    const send = document.getElementById("send");
    let conversationId = null;

    function append(role, text) {
      const div = document.createElement("div");
      div.className = "msg " + role;
      div.innerHTML = '<div class="role">' + role + "</div>";
      const body = document.createElement("div");
      body.textContent = text;
      div.appendChild(body);
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;
      append("user", message);
      input.value = "";
      send.disabled = true;
      try {
        const res = await fetch("/api/v1/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, conversation_id: conversationId }),
        });
        const data = await res.json();
        conversationId = data.conversation_id || conversationId;
        append("assistant", data.response || "(빈 응답)");
      } catch (err) {
        append("assistant", "요청 실패: " + err);
      } finally {
        send.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
